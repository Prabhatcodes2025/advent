<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Snow Feather Expeditions and Adventures logo</title>
  <desc id="desc">Gold and navy Snow Feather monogram with feather emblem for Kashmir tours and travels.</desc>
  <defs>
    <linearGradient id="wood" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2d211a"/>
      <stop offset="0.45" stop-color="#151d25"/>
      <stop offset="1" stop-color="#3a2a20"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff0b7"/>
      <stop offset="0.34" stop-color="#d8a94f"/>
      <stop offset="0.68" stop-color="#8f6426"/>
      <stop offset="1" stop-color="#f5d88a"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071827"/>
      <stop offset="1" stop-color="#11395a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/>
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#ffffff" flood-opacity="0.22"/>
    </filter>
    <path id="topArc" d="M 210 535 A 390 390 0 0 1 990 535"/>
    <path id="bottomArc" d="M 300 785 A 335 335 0 0 0 900 785"/>
  </defs>

  <rect width="1200" height="1200" fill="url(#wood)"/>
  <g opacity="0.18">
    <rect y="80" width="1200" height="18" fill="#ffffff"/>
    <rect y="220" width="1200" height="14" fill="#000000"/>
    <rect y="354" width="1200" height="18" fill="#ffffff"/>
    <rect y="502" width="1200" height="12" fill="#000000"/>
    <rect y="688" width="1200" height="16" fill="#ffffff"/>
    <rect y="860" width="1200" height="14" fill="#000000"/>
    <rect y="1014" width="1200" height="18" fill="#ffffff"/>
  </g>

  <g filter="url(#shadow)">
    <circle cx="600" cy="560" r="360" fill="none" stroke="url(#gold)" stroke-width="18"/>
    <circle cx="600" cy="560" r="300" fill="none" stroke="url(#gold)" stroke-width="8" opacity="0.72"/>

    <text font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="700" letter-spacing="12" fill="url(#gold)">
      <textPath href="#topArc" startOffset="50%" text-anchor="middle">SNOW FEATHER</textPath>
    </text>

    <text x="600" y="646" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="360" font-weight="700" fill="url(#gold)" stroke="#071827" stroke-width="10">S</text>
    <text x="705" y="690" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="340" font-weight="700" fill="url(#navy)" stroke="url(#gold)" stroke-width="8">F</text>

    <g transform="translate(480 465) rotate(-24)">
      <path d="M20 310 C185 190 330 86 510 28 C404 170 304 262 128 360 Z" fill="url(#gold)" stroke="#071827" stroke-width="10"/>
      <path d="M78 326 C220 248 352 144 493 37" fill="none" stroke="#ffffff" stroke-width="10" opacity="0.9"/>
      <path d="M164 282 L138 208 M226 238 L210 154 M286 192 L280 106 M348 142 L358 70 M402 98 L430 48" fill="none" stroke="#071827" stroke-width="8" opacity="0.82"/>
      <path d="M92 320 C210 252 338 148 492 38 C420 120 312 244 122 362 Z" fill="#ffffff" opacity="0.22"/>
    </g>

    <text font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" letter-spacing="8" fill="url(#gold)">
      <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">EXPEDITIONS AND ADVENTURES</textPath>
    </text>

    <text x="600" y="1004" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="700" letter-spacing="14" fill="url(#gold)">TOURS &amp; TRAVELS</text>
    <text x="600" y="1090" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="74" font-weight="700" letter-spacing="22" fill="url(#gold)">KASHMIR</text>
    <path d="M432 1042 H768" stroke="url(#gold)" stroke-width="8"/>
    <rect x="584" y="1028" width="32" height="32" transform="rotate(45 600 1044)" fill="url(#gold)"/>
  </g>
</svg>
